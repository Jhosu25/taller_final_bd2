<div class="dashboard">

  <!-- HEADER -->
  <header class="header">
    <div>
      <h1>Covid-19 Dashboard</h1>
      <p>MongoDB Atlas Analytics</p>
    </div>

   <!-- BUSCADOR -->
<input 
  type="text" 
  placeholder="Buscar país..." 
  (input)="onSearch($event)"
/>
  </header>

  <!-- FILTROS -->
  <div class="filters">
  <button (click)="setFilter('cases')" [class.active]="selectedFilter==='cases'">Casos</button>
  <button (click)="setFilter('deaths')" [class.active]="selectedFilter==='deaths'">Casos por Continentes</button>
</div>

  <!-- GRID CHARTS -->
  <div class="grid">

    @for (chart of charts; track chart) {
      <div class="chart-card">
        <iframe [src]="chart"></iframe>
      </div>
    }

  </div>

</div>
