<div class="dashboard">

  <!-- HEADER -->
  <header class="header">
    <div>
      <h1>Covid-19 Dashboard</h1>
      <p>MongoDB Atlas Analytics</p>
    </div>

    <!-- BUSCADOR -->
    <div class="search-box">
      <input type="text" placeholder="Buscar país..." />
    </div>
  </header>

  <!-- FILTROS -->
  <div class="filters">
    <button class="filter active">Casos</button>
    <button class="filter">Muertes</button>
    <button class="filter">Vacunación</button>
  </div>

  <!-- GRID CHARTS -->
  <div class="grid">

    @for (chart of charts; track chart) {
      <div class="chart-card">
        <iframe [src]="chart"></iframe>
      </div>
    }

  </div>

</div>
